name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.303

    - name: Show SDK
      run: dotnet --info

    - name: Install MAUI
      run: |
        dotnet workload install maui-ios
        dotnet workload restore

    - name: Restore
      run: dotnet restore

    - name: Build iOS
      run: dotnet build OccasionReminder.csproj -f net9.0-ios -c Release

    - name: Publish IPA
      run: |
        dotnet publish OccasionReminder.csproj \
        -f net9.0-ios \
        -c Release \
        -p:ArchiveOnBuild=true \
        -p:RuntimeIdentifier=ios-arm64

    - uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: '**/*.ipa'
