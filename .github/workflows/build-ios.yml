name: Build iOS
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - run: dotnet workload install maui
    - run: dotnet workload restore
    - run: dotnet restore
    - run: dotnet build -c Release -f net8.0-ios
    - uses: actions/upload-
