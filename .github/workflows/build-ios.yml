name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install MAUI
      run: |
        dotnet workload install maui

    - name: Restore
      run: dotnet restore

    - name: Build iOS
      run: dotnet publish OccasionReminder.csproj -c Release -f net9.0-ios -p:ArchiveOnBuild=true -p:RuntimeIdentifier=ios-arm64

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: '**/*.ipa'
