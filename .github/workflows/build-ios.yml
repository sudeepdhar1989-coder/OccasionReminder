name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x


    - name: Install MAUI workloads
      run: |
        dotnet workload install maui
        dotnet workload install ios


    - name: Restore dependencies
      run: dotnet restore


    - name: Build iOS app
      run: |
        dotnet publish OccasionReminder.csproj \
        -f net9.0-ios \
        -c Release \
        -p:BuildIpa=true \
        -p:RuntimeIdentifier=ios-arm64


    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: OccasionReminder-IPA
        path: |
          **/*.ipa
